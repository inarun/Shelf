{{define "iconSprite"}}
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" aria-hidden="true" focusable="false" class="icon-sprite">
  <!-- Session 10: icon-logo is the Shelf brand mark paired with the
       "Shelf" wordmark in the top nav. A 24×24 bookshelf with three
       uprights and five stacked spines — simple silhouette, reads as
       "shelf" at 20px. All strokes are currentColor so it inherits
       the accent palette from its container. -->
  <symbol id="icon-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="16" rx="2.25"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <rect x="6"  y="6.5" width="1.75" height="4" rx="0.4" fill="currentColor" stroke="none"/>
    <rect x="9"  y="6.5" width="1.75" height="4" rx="0.4" fill="currentColor" stroke="none"/>
    <rect x="12" y="6.5" width="1.75" height="4" rx="0.4" fill="currentColor" stroke="none"/>
    <rect x="6"  y="14"  width="1.75" height="4" rx="0.4" fill="currentColor" stroke="none"/>
    <rect x="9"  y="14"  width="1.75" height="4" rx="0.4" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="icon-star-filled" viewBox="0 0 24 24">
    <path d="M12 2.5l2.95 5.98 6.6.96-4.78 4.66 1.13 6.58L12 17.58l-5.9 3.1 1.13-6.58L2.45 9.44l6.6-.96L12 2.5z" fill="currentColor"/>
  </symbol>
  <symbol id="icon-star-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2.5l2.95 5.98 6.6.96-4.78 4.66 1.13 6.58L12 17.58l-5.9 3.1 1.13-6.58L2.45 9.44l6.6-.96L12 2.5z"/>
  </symbol>
  <!-- Session 15: icon-star-half renders a half-filled star for
       fractional overall ratings on the book-detail page. Left half is
       filled (currentColor), right half is an outline of the same path
       so the two glyphs align pixel-for-pixel when placed adjacent. -->
  <symbol id="icon-star-half" viewBox="0 0 24 24">
    <path d="M12 2.5l-2.95 5.98-6.6.96 4.78 4.66-1.13 6.58L12 17.58V2.5z" fill="currentColor"/>
    <path d="M12 2.5l2.95 5.98 6.6.96-4.78 4.66 1.13 6.58L12 17.58l-5.9 3.1 1.13-6.58L2.45 9.44l6.6-.96L12 2.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>
  <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="icon-keyboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="5" width="20" height="14" rx="2"/>
    <line x1="6" y1="9" x2="6.01" y2="9"/>
    <line x1="10" y1="9" x2="10.01" y2="9"/>
    <line x1="14" y1="9" x2="14.01" y2="9"/>
    <line x1="18" y1="9" x2="18.01" y2="9"/>
    <line x1="6" y1="13" x2="6.01" y2="13"/>
    <line x1="10" y1="13" x2="14" y2="13"/>
    <line x1="18" y1="13" x2="18.01" y2="13"/>
    <line x1="7" y1="17" x2="17" y2="17"/>
  </symbol>
  <!-- Session 14: icon-audio marks reading-timeline entries that came
       from Audiobookshelf. Stroked headphones glyph — arc for the band,
       two rounded rectangles for the ear-cups. 24×24, currentColor so
       it inherits the surrounding entry's color. -->
  <symbol id="icon-audio" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 14v-2a8 8 0 0 1 16 0v2"/>
    <rect x="2.5" y="14" width="4.5" height="6" rx="1.2"/>
    <rect x="17"  y="14" width="4.5" height="6" rx="1.2"/>
  </symbol>
  <symbol id="icon-empty-shelf" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="8"  y1="22" x2="56" y2="22"/>
    <line x1="8"  y1="42" x2="56" y2="42"/>
    <line x1="8"  y1="22" x2="8"  y2="42"/>
    <line x1="56" y1="22" x2="56" y2="42"/>
    <rect x="14" y="26" width="6"  height="16" rx="1" stroke-dasharray="2 3"/>
    <rect x="24" y="28" width="6"  height="14" rx="1" stroke-dasharray="2 3"/>
    <rect x="34" y="26" width="6"  height="16" rx="1" stroke-dasharray="2 3"/>
    <rect x="44" y="30" width="6"  height="12" rx="1" stroke-dasharray="2 3"/>
  </symbol>
  <symbol id="icon-empty-chart" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="12 12 12 52 54 52"/>
    <line x1="20" y1="52" x2="28" y2="52" stroke-dasharray="2 3"/>
    <line x1="32" y1="52" x2="40" y2="52" stroke-dasharray="2 3"/>
    <line x1="44" y1="52" x2="52" y2="52" stroke-dasharray="2 3"/>
  </symbol>
  <symbol id="icon-empty-timeline" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="22" y1="10" x2="22" y2="54" stroke-dasharray="3 4"/>
    <circle cx="22" cy="20" r="4"/>
    <circle cx="22" cy="44" r="4"/>
    <line x1="32" y1="20" x2="52" y2="20" stroke-dasharray="2 3"/>
    <line x1="32" y1="44" x2="48" y2="44" stroke-dasharray="2 3"/>
  </symbol>
</svg>
{{end}}
