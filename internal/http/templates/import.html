{{define "import"}}
<!doctype html>
<html lang="en">
<head>
  {{template "head" .}}
  <title>Import — Shelf</title>
</head>
<body data-request-id="{{.RequestID}}">
  {{template "nav" .}}
  <main id="main">
    <h1>Import from Goodreads</h1>
    <p>Upload your Goodreads CSV export. You'll see a preview before anything is written. Shelf snapshots the Books folder to <code>backups/</code> before any Apply.</p>

    <form id="plan-form" class="import-plan-form" enctype="multipart/form-data">
      <label for="csv-input">Goodreads CSV</label>
      <input id="csv-input" type="file" name="csv" accept=".csv,text/csv" required>
      <button type="submit" class="primary">Preview plan</button>
    </form>

    <section id="plan-output" aria-live="polite"></section>
    <div class="import-apply-row">
      <button id="apply-btn" type="button" class="primary" disabled>Apply import</button>
    </div>
    <section id="apply-report" aria-live="polite"></section>
  </main>
  {{template "scripts" .}}
</body>
</html>
{{end}}
