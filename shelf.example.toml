# Shelf config example. Copy this to `shelf.toml` (gitignored) and fill
# in the paths for your setup. Put `shelf.toml` next to `shelf.exe` —
# that's portable-mode default.
#
# For the full schema and defaults, see internal/config/config.go.

[vault]
# Absolute path to your Obsidian vault (or any folder hosting book notes).
path = "C:\\Users\\YOU\\path\\to\\vault"

# Vault-relative path to the folder holding book notes. Forward or
# back slashes both work. Must exist under vault.path.
books_folder = "Books"

[server]
# Localhost-only by default (SKILL.md §Core Invariant #4). Binding to
# anything other than 127.0.0.1 / localhost triggers a startup warning.
bind = "127.0.0.1"
port = 7744

# [data]
# directory = "D:\\Shelf-data"
#   Optional. Defaults to the directory containing shelf.exe (portable mode).
#   Holds shelf.db, covers/, backups/, logs/ — none of which should be
#   committed or synced.

[providers.openlibrary]
# Explicit opt-in to outbound metadata + cover lookups (SKILL.md §Core
# Invariant #8 — no phone-home by default). When `enabled = false` the
# add-book page shows a "provider not configured" banner and the
# /api/add/* endpoints return 503; Shelf still runs fully as a local
# library manager. Comment this whole section out or flip to `false`
# to opt back out.
enabled        = true
cache_ttl_days = 30

[providers.audiobookshelf]
# Explicit opt-in to outbound sync from a self-hosted Audiobookshelf
# server (SKILL.md §Core Invariant #8 — no phone-home by default).
# When `enabled = false`, Shelf makes no outbound connections to AB and
# future /api/sync/audiobookshelf/* endpoints return 503. Shelf still
# runs fully without AB.
#
# Security: api_key is bearer-style and MUST NOT be checked into source
# control. This file ships as an example only.
enabled           = false
base_url          = "http://localhost:13378"
api_key           = ""
cache_ttl_minutes = 15

[recommender]
# Opt-in gate for the rule-based recommender (v0.3). When `enabled =
# false` the /api/recommendations/profile debug endpoint returns 503,
# and future /recommendations UI (Session 19) is hidden. No outbound
# HTTP — the recommender is a pure local computation over the index.
# Flip to `true` to peek at the taste profile Shelf derives from your
# library.
enabled = false

[recommender.llm]
# Opt-in to the LLM-tuned recommender (v0.4). When `enabled = true`,
# the "Tune" button on /recommendations (Session 24) sends your rated
# review text + metadata to the Anthropic API using your own key —
# once, on explicit click. SKILL.md §Core Invariant #8: no phone-home
# by default; this switch does not initiate any traffic on its own.
#
# Security:
#   - api_key is BYO and MUST NOT be checked into source control.
#   - model must be one of the allowlisted Claude IDs (sonnet-4-6,
#     opus-4-7, haiku-4-5). Adding a new ID is a spec change
#     (SKILL.md §Conventions), not a config change.
#   - Every outbound call enforces a 30s timeout, 512 KiB response
#     cap, application/json content-type allowlist, and same-host
#     redirect policy.
enabled = false
api_key = ""
model   = "claude-haiku-4-5"
